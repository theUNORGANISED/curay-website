<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Curay — Coming Soon</title>

  <!-- Favicon placeholder -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='28'>✦</text></svg>" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />

  <!-- Stylesheet -->
  <link rel="stylesheet" href="styles.css" />

</head>
<body>

  <div class="page">

    <!-- Top-left: Logo -->
    <a href="/" class="logo">Curay</a>

    <!-- Top-right: Links -->
    <nav class="nav-links">
      <a href="https://instagram.com" target="_blank" class="nav-link">Instagram</a>
    </nav>

    <!-- Center content -->
    <div class="center">
      <h1 class="headline">Everything you love. In one place.</h1>
      <p class="subline">Coming Soon.</p>

   
    </div>

    <!-- Bottom bar -->
    <div class="bottom-bar">
      <span class="bottom-copy">© 2025 Curay</span>
      <span class="bottom-tagline">Save. Organize. Love.</span>
    </div>

  </div>

  <script>
    function handleSubmit(e) {
      e.preventDefault();
      const input = document.getElementById('emailInput');
      const note  = document.getElementById('formNote');
      if (!input.value) return;
      input.value = '';
      note.textContent = "You're on the list. We'll be in touch soon.";
      note.classList.add('success');
    }
  </script>

</body>
</html>
