<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Curay — Coming Soon</title>

<script src="/head.js"></script>
  <link rel="stylesheet" href="styles.css" />

</head>
<body>

  <div class="page">

    <!-- Top-left: Logo -->
     <a href="/" class="logo">
      <img src="/assets/logo.svg" alt="Curay" height="20" />
    </a>

    <!-- Top-right: Links -->
    <nav class="nav-links">
      <a href="https://instagram.com/curay.app" target="_blank" class="nav-link">Instagram</a>
    </nav>

    <!-- Center content -->
    <div class="center">
      <h1 class="headline">Everything you love. In one place.</h1>
      <p class="subline">Coming Soon.</p>

   
    </div>

    <!-- Bottom bar -->
    <div class="bottom-bar">
      <span class="bottom-copy">© 2026 Curay</span>
      <span class="bottom-tagline">Save. Organize. Love.</span>
    </div>

  </div>

  <script>
    function handleSubmit(e) {
      e.preventDefault();
      const input = document.getElementById('emailInput');
      const note  = document.getElementById('formNote');
      if (!input.value) return;
      input.value = '';
      note.textContent = "You're on the list. We'll be in touch soon.";
      note.classList.add('success');
    }
  </script>

</body>
</html>
